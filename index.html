<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR STRIKE - Online Artillery</title>
    <link rel="stylesheet" href="style.css?v=17">
    <title> tank attak </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 로비 화면 스타일 */
        #lobby-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #2a2a2a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }

        h1 {
            color: #f1c40f;
            font-size: 36px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        #tank-select, #room-code {
            width: 280px;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #555;
            background: #333;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        #join-btn {
            width: 305px;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        #join-btn:hover {
            background: #2ecc71;
        }

        /* 게임 화면 스타일 */
        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #ui-layer {
            width: 1200px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .player-info {
            width: 350px;
        }

        .hp-bar-bg {
            width: 100%;
            height: 25px;
            background: #444;
            border: 2px solid #555;
            border-radius: 12.5px;
            overflow: hidden;
            position: relative;
        }

        .hp-bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
        }

        #hp1 { background: linear-gradient(to right, #2980b9, #3498db); }
        #hp2 { background: linear-gradient(to right, #c0392b, #e74c3c); }

        canvas {
            background-color: #000;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #turn-display {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }

        #status {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-family: monospace;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="lobby-container">
        <h1>STELLAR STRIKE</h1>
        <div class="lobby-box">
            <input type="text" id="room-code" placeholder="ENTER ROOM CODE (ex: 7777)">
            <button id="join-btn">JOIN / CREATE ROOM</button>
            <div id="lobby-status">친구와 같은 코드를 입력하고 접속하세요.</div>
        </div>
        <h1>FORTRESS ONLINE</h1>
        
        <label style="margin-bottom: 8px; font-size: 14px; color: #aaa;">탱크 클래스 선택</label>
        <select id="tank-select">
            <option value="balanced"> Basic (HP 300 / 연료 100)</option>
            <option value="heavy"> Shilder (HP 450 / 연료 50)</option>
            <option value="light"> Fast type (HP 200 / 연료 200)</option>
        </select>

        <input type="text" id="room-code" placeholder="방 코드 입력 (예: 1234)">
        <button id="join-btn">전투 참가</button>
        <p id="lobby-status" style="color: #e74c3c; margin-top: 15px;"></p>
</div>

    <div id="game-container" style="display: none;">
        <div id="ui">
    <div id="game-container">
        <div id="ui-layer">
<div class="player-info">
                <div class="p-label">PLAYER 1 (BLUE)</div>
                <div class="hp-bar"><div id="hp1" class="hp-fill"></div></div>
                <div style="margin-bottom: 5px; font-weight: bold; color: #3498db;">PLAYER 1</div>
                <div class="hp-bar-bg">
                    <div id="hp1" class="hp-bar-fill"></div>
                </div>
</div>
            <div class="status-board">
                <div id="turn-display">READY...</div>
                <div id="status">ANGLE: 45° | POWER: 0 | FUEL: 100</div>
            </div>
            <div class="player-info">
                <div class="p-label">PLAYER 2 (RED)</div>
                <div class="hp-bar"><div id="hp2" class="hp-fill"></div></div>
            <div id="turn-display">WAITING...</div>
            <div class="player-info" style="text-align: right;">
                <div style="margin-bottom: 5px; font-weight: bold; color: #e74c3c;">PLAYER 2</div>
                <div class="hp-bar-bg">
                    <div id="hp2" class="hp-bar-fill"></div>
                </div>
</div>
</div>
        <canvas id="gameCanvas" width="1200" height="500"></canvas>

        <canvas id="gameCanvas" width="1200" height="600"></canvas>
        <div id="status">ANGLE: 45 | POWER: 0 | FUEL: 100</div>
</div>

    <script type="module" src="game.js?v=17"></script>
    <script type="module" src="game.js?v=23"></script>
</body>
</html>
